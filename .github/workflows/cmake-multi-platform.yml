name: GuiLite自动化编译检测流水线

# 触发时机：推送代码、提交PR时自动运行
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4

      - name: 安装CMake编译工具
        run: sudo apt update && sudo apt install cmake g++

      - name: 创建编译目录、配置CMake
        run: |
          mkdir build
          cd build
          # 新增 -DCMAKE_CXX_FLAGS="-Wall -Wextra" 开启全部警告
          cmake ../src -DCMAKE_POLICY_MINIMUM_VERSION=3.5 -DCMAKE_CXX_FLAGS="-Wall -Wextra"

      - name: 编译并捕获警告日志
        run: |
          cd build
          make -j4 2> warn.log
        continue-on-error: false

      # 读取警告并展示到页面提示区
      - name: 展示C++编译警告
        id: show_warn
        run: |
          if [ -s build/warn.log ]; then
            echo "WARNING<<EOF" >> $GITHUB_ENV
            cat build/warn.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
      - name: 输出警告至页面Annotations
        if: env.WARNING != ''
        run: echo "::warning file=src/widgets/widgets.cpp::$env.WARNING"
