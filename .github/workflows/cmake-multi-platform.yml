name: GuiLite自动化编译检测流水线

# 触发时机：推送代码、提交PR时自动运行
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4

      - name: 安装CMake编译工具
        run: sudo apt update && sudo apt install cmake g++

      - name: 创建编译目录、配置CMake
        run: |
          mkdir build
          cd build
          cmake ../src -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: 编译并捕获全部警告日志
        run: |
          cd build
          make -j4 2> warn.log
        continue-on-error: false

      # 将编译警告上报到页面Annotations面板展示
      - name: 页面输出C++编译警告
        if: exists('build/warn.log')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const warnPath = 'build/warn.log';
            if (fs.existsSync(warnPath)) {
              const warnContent = fs.readFileSync(warnPath, 'utf8');
              if (warnContent.trim()) {
                core.warning(`【C++代码编译警告汇总】\n${warnContent}`);
              }
            }
